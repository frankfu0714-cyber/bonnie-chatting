name: bonniechatting
options:
  bundleIdPrefix: com.frankfu
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: zh-Hant
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "632H46CT74"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  bonniechatting:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: bonniechatting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.frankfu.bonniechatting
        PRODUCT_NAME: bonniechatting
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        # Fallback display name (matches zh-Hant.lproj/InfoPlist.strings — primary locale).
        # Per-locale CFBundleDisplayName overrides take precedence:
        #   zh-Hant.lproj → "幫你決定?"
        #   en.lproj      → "Bonnie Chatting"
        INFOPLIST_KEY_CFBundleDisplayName: 幫你決定?
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_CFBundleLocalizations: "zh-Hant en"
        INFOPLIST_KEY_CFBundleDevelopmentRegion: zh-Hant
        SWIFT_EMIT_LOC_STRINGS: YES
